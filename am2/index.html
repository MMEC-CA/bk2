<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="robots" content="noindex, nofollow">
  <title>Marble Sadness</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; touch-action: none; }
    canvas { display: block; }
    #hud { position: fixed; top: 8px; left: 8px; color: #aaa; font-family: monospace; font-size: 12px; pointer-events: none; z-index: 10; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
</head>
<body>
  <div id="hud"></div>
  <canvas id="game"></canvas>
  <script>
    // ============================================================
    // MARBLE SADNESS - Multiplayer Marble Rolling Game
    // ============================================================
    // Lobby: 12 color slots, level chooser (table tilt angles)
    // Game: Marbles roll on tilting table surface
    //   - Gravity pulls marbles off table
    //   - Last marble on table wins
    //   - WASD + Arrow keys for 2-player local play
    //   - WebRTC for LAN multiplayer
    // ============================================================

    var BUILD = 'v2026-04-18-c';
    var GW = 1920, GH = 1080;

    // Physics constants
    var GRAV_ACCEL = 0;
    var FRICTION = 0.95;    // per-frame decay
    var MARBLE_RADIUS = 8;
    var TABLE_MAX_WIDTH = 1600;
    var TABLE_MAX_HEIGHT = 900;
    var TABLE_MIN_WIDTH = 600;
    var TABLE_MIN_HEIGHT = 340;
    var TABLE_WIDTH = 1600;
    var TABLE_HEIGHT = 900;
    var TABLE_CENTER_X = GW / 2;
    var TABLE_CENTER_Y = GH / 2;
    var TABLE_RADIUS = Math.min(TABLE_WIDTH, TABLE_HEIGHT) * 0.45;

    var SLOT_COLORS = [
      { hex: '#ff0000', name: 'Red' },
      { hex: '#00ff00', name: 'Lime' },
      { hex: '#0000ff', name: 'Blue' },
      { hex: '#ffff00', name: 'Yellow' },
      { hex: '#ff00ff', name: 'Magenta' },
      { hex: '#00ffff', name: 'Cyan' },
      { hex: '#ff8800', name: 'Orange' },
      { hex: '#ff0088', name: 'Pink' },
      { hex: '#8800ff', name: 'Purple' },
      { hex: '#88ff00', name: 'Lime2' },
      { hex: '#00ff88', name: 'Mint' },
      { hex: '#ffff88', name: 'LtYellow' }
    ];

    // Lobby state
    var lobbyState = 'lobby'; // 'lobby', 'countdown', 'game', 'gameover', 'observer'
    var selectedLevel = 1;   // affects table tilt angle
    var countdownTimer = 0;
    var countdownStart = 0;
    var COUNTDOWN_DURATION = 3.0;

    // Networking
    var sigSocket = null;
    var sigReconnectTimer = null;
    var peerConnections = {};
    var dataChannels = {};
    var pendingCandidates = {};
    var connectedPeerIds = {};

    // Game state
    var gameTime = 0, lastTime = 0;
    var gameMarbles = [];     // all marbles in game
    var playerMarbles = {};   // peerId -> marble
    var playerLives = {};     // peerId -> alive (true/false)
    var cfg = null;           // current level config

    // Timing
    var gameOverTime = 0;
    var GAME_OVER_LOCKOUT = 5.0;
    var myPeerId = crypto.randomUUID().slice(0, 8);
    var mySlotIndex = -1;
    var myDeviceInfo = getDeviceInfo();
    var isHost = false;
    var hostPeerId = null;
    var PLAYER_ACCEL = 1800;
    var MAX_PLAYER_SPEED = 1200;
    var AI_MARBLES = 3;
    var HOLD_DURATION = 3.0;

    // Lobby slots
    var slots = [];
    for (var i = 0; i < 12; i++) {
      slots.push({
        peerId: null,
        deviceInfo: '',
        progress: 0,
        ready: false,
        holding: false
      });
    }

    // Input
    var keys = { l: false, r: false, u: false, d: false };
    var keys2 = { l: false, r: false, u: false, d: false };
    var hasLocalPlayer2 = false;
    var localPlayer2PeerId = null;
    var localPlayer2SlotIndex = -1;
    var holdingLeft = false, leftHoldStart = 0, leftProgress = 0;
    var holdingRight = false, rightHoldStart = 0, rightProgress = 0;

    var canvas = document.getElementById('game');
    var ctx = canvas.getContext('2d');
    var hud = document.getElementById('hud');

    // ============================================================
    // AUDIO
    // ============================================================
    var audioCtx = null;
    function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    function playTone(freq, dur, vol, type) {
      if (!audioCtx) return;
      var o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.type = type || 'sine'; o.frequency.value = freq;
      g.gain.setValueAtTime(vol || 0.3, audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
      o.connect(g); g.connect(audioCtx.destination);
      o.start(); o.stop(audioCtx.currentTime + dur);
    }

    // ============================================================
    // UTILITY
    // ============================================================
    function getDeviceInfo() {
      var ua = navigator.userAgent;
      if (/iPhone/.test(ua)) return 'iPhone (touch)';
      if (/iPad/.test(ua)) return 'iPad (touch)';
      if (/Android/.test(ua)) {
        if (/Mobile/.test(ua)) return 'Android (touch)';
        return 'Android tablet (touch)';
      }
      if (/Mac/.test(ua)) return 'Mac (↔ + WASD)';
      if (/Windows/.test(ua)) return 'Windows (↔ + WASD)';
      if (/Linux/.test(ua)) return 'Linux (↔ + WASD)';
      return 'Desktop (↔ + WASD)';
    }

    function makeLevel(lv) {
      return {
        level: lv,
        tilt: 0,
        tiltRad: 0,
        gravity: 0,
        friction: Math.max(0.88, Math.min(0.96, 0.95 - lv * 0.001))
      };
    }

    // ============================================================
    // MARBLE PHYSICS
    // ============================================================
    function Marble(peerId, color, slotIndex) {
      this.peerId = peerId;
      this.color = color;
      this.slotIndex = slotIndex;
      var angle = Math.random() * Math.PI * 2;
      var radius = TABLE_RADIUS * 0.3 * Math.sqrt(Math.random());
      this.x = TABLE_CENTER_X + Math.cos(angle) * radius;
      this.y = TABLE_CENTER_Y + Math.sin(angle) * radius;
      this.vx = 0;
      this.vy = 0;
      this.alive = true;
      this.radius = MARBLE_RADIUS;
    }
    Marble.prototype.update = function(dt, cfgData) {
      if (!this.alive) return;
      
      // Apply slow arena friction and any control or AI forces
      this.vx *= cfgData.friction;
      this.vy *= cfgData.friction;
      
      // Update position
      this.x += this.vx * dt;
      this.y += this.vy * dt;
      
      // Check if marble fell off circular table
      var dx = this.x - TABLE_CENTER_X;
      var dy = this.y - TABLE_CENTER_Y;
      if (Math.sqrt(dx * dx + dy * dy) > TABLE_RADIUS + this.radius) {
        this.alive = false;
        playTone(200, 0.1, 0.2);
      }
    };
    Marble.prototype.render = function() {
      if (!this.alive) return;
      ctx.fillStyle = this.color;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 1;
      ctx.stroke();
    };

    function createMarble(peerId, color, slotIndex, isAI) {
      var m = new Marble(peerId, color, slotIndex);
      m.isAI = !!isAI;
      m.aiTimer = 0;
      m.aiTarget = null;
      return m;
    }

    function setupGameMarbles(defs) {
      gameMarbles = [];
      playerMarbles = {};
      playerLives = {};
      defs.forEach(function(d) {
        var m = createMarble(d.peerId, d.color, d.slotIndex, d.isAI);
        gameMarbles.push(m);
        if (!m.isAI) playerMarbles[m.peerId] = m;
        playerLives[m.peerId] = true;
      });
    }

    function applyPlayerControl(m, dt) {
      if (!m.alive) return;
      var localKeys = null;
      if (m.peerId === myPeerId) {
        localKeys = keys2;
      } else if (m.peerId === localPlayer2PeerId) {
        localKeys = keys;
      }
      if (!localKeys) return;
      var ax = 0, ay = 0;
      if (localKeys.l) ax -= PLAYER_ACCEL;
      if (localKeys.r) ax += PLAYER_ACCEL;
      if (localKeys.u) ay -= PLAYER_ACCEL;
      if (localKeys.d) ay += PLAYER_ACCEL;
      m.vx += ax * dt;
      m.vy += ay * dt;
      var speed = Math.hypot(m.vx, m.vy);
      if (speed > MAX_PLAYER_SPEED) {
        var scale = MAX_PLAYER_SPEED / speed;
        m.vx *= scale;
        m.vy *= scale;
      }
    }

    function updateAI(m, dt) {
      if (!m.alive) return;
      m.aiTimer -= dt;
      if (m.aiTimer <= 0 || !m.aiTarget || !m.aiTarget.alive) {
        var targets = gameMarbles.filter(function(other) {
          return other.alive && !other.isAI && other !== m;
        });
        if (!targets.length) {
          targets = gameMarbles.filter(function(other) {
            return other.alive && other !== m;
          });
        }
        if (targets.length) {
          m.aiTarget = targets[Math.floor(Math.random() * targets.length)];
        }
        m.aiTimer = 0.4 + Math.random() * 0.6;
      }
      if (m.aiTarget) {
        var dx = m.aiTarget.x - m.x;
        var dy = m.aiTarget.y - m.y;
        var dist = Math.max(1, Math.sqrt(dx * dx + dy * dy));
        var strength = 1600;
        m.vx += (dx / dist) * strength * dt;
        m.vy += (dy / dist) * strength * dt;
      }
    }

    function resolveMarbleCollisions() {
      for (var i = 0; i < gameMarbles.length; i++) {
        var a = gameMarbles[i];
        if (!a.alive) continue;
        for (var j = i + 1; j < gameMarbles.length; j++) {
          var b = gameMarbles[j];
          if (!b.alive) continue;
          var dx = b.x - a.x;
          var dy = b.y - a.y;
          var dist = Math.sqrt(dx * dx + dy * dy);
          var minDist = a.radius + b.radius;
          if (dist <= 0) {
            dx = 1;
            dy = 0;
            dist = 1;
          }
          if (dist < minDist) {
            var overlap = (minDist - dist) * 0.5;
            var nx = dx / dist;
            var ny = dy / dist;
            a.x -= nx * overlap;
            a.y -= ny * overlap;
            b.x += nx * overlap;
            b.y += ny * overlap;
            var relVel = (b.vx - a.vx) * nx + (b.vy - a.vy) * ny;
            if (relVel > 0) continue;
            var impulse = -(1.0 + 0.8) * relVel * 0.5;
            var ix = impulse * nx;
            var iy = impulse * ny;
            a.vx -= ix;
            a.vy -= iy;
            b.vx += ix;
            b.vy += iy;
          }
        }
      }
    }

    // ============================================================
    // LOBBY STATE
    // ============================================================
    function findSlotByPeer(peerId) {
      for (var i = 0; i < 12; i++) {
        if (slots[i].peerId === peerId) return i;
      }
      return -1;
    }

    function claimSlot(peerId, deviceInfo) {
      var existing = findSlotByPeer(peerId);
      if (existing >= 0) {
        console.log('claimSlot: existing slot for', peerId, '=>', existing);
        return existing;
      }
      for (var i = 0; i < 12; i++) {
        if (slots[i].peerId === null) {
          slots[i].peerId = peerId;
          slots[i].deviceInfo = deviceInfo;
          slots[i].progress = 0;
          slots[i].ready = false;
          broadcast({
            type: 'lobby-join',
            peerId: peerId,
            slotIndex: i,
            deviceInfo: deviceInfo
          });
          console.log('claimSlot: new slot for', peerId, '=>', i);
          determineHost();
          return i;
        }
      }
      console.log('claimSlot: no free slot for', peerId);
      return -1;
    }

    function resetLobbyState() {
      for (var i = 0; i < 12; i++) {
        if (slots[i].peerId !== null) {
          slots[i].progress = 0;
          slots[i].ready = false;
          slots[i].holding = false;
        }
      }
      holdingLeft = false;
      holdingRight = false;
      leftProgress = 0;
      rightProgress = 0;
      leftHoldStart = 0;
      rightHoldStart = 0;
      countdownTimer = 0;
    }

    function startHoldLeft() {
      if (lobbyState !== 'lobby' || holdingLeft) {
        console.log('startHoldLeft blocked, lobbyState=', lobbyState, 'holdingLeft=', holdingLeft);
        return;
      }
      console.log('startHoldLeft: Setting holdingLeft = true');
      holdingLeft = true;
      leftHoldStart = performance.now();
      // Immediately claim a slot to show progress
      if (mySlotIndex < 0) {
        mySlotIndex = claimSlot(myPeerId, myDeviceInfo);
        console.log('Left hold started, claimed slot:', mySlotIndex);
      }
    }
    function updateHoldLeft(dt) {
      if ((lobbyState !== 'lobby' && lobbyState !== 'countdown') || !holdingLeft) return;
      var elapsed = (performance.now() - leftHoldStart) / 1000;
      leftProgress = Math.min(100, (elapsed / HOLD_DURATION) * 100);
      if (mySlotIndex >= 0) {
        slots[mySlotIndex].progress = leftProgress;
      }
      if (leftProgress % 25 < dt * 100) console.log('holdLeft progress:', leftProgress.toFixed(1) + '%');
      if (elapsed >= HOLD_DURATION) {
        holdingLeft = false;
        if (mySlotIndex < 0) {
          mySlotIndex = claimSlot(myPeerId, myDeviceInfo);
        }
        if (mySlotIndex >= 0) {
          slots[mySlotIndex].ready = true;
          slots[mySlotIndex].progress = 100;
          broadcast({ type: 'lobby-ready', peerId: myPeerId });
          checkCountdownStart();
        }
      }
    }
    function releaseHoldLeft() {
      holdingLeft = false;
      leftProgress = 0;
      if (mySlotIndex >= 0 && !slots[mySlotIndex].ready) {
        // Reset slot progress if hold was interrupted before reaching 3 seconds
        slots[mySlotIndex].progress = 0;
      }
      checkCountdownStart();
    }

    function startHoldRight() {
      console.log('startHoldRight called. lobbyState:', lobbyState, 'holdingRight:', holdingRight);
      if (lobbyState !== 'lobby' || holdingRight) { 
        console.log('startHoldRight blocked, lobbyState=', lobbyState, 'holdingRight=', holdingRight);
        return; 
      }
      console.log('startHoldRight: Setting holdingRight = true');
      holdingRight = true;
      rightHoldStart = performance.now();
      // Immediately claim a slot to show progress
      if (localPlayer2SlotIndex < 0) {
        localPlayer2SlotIndex = claimSlot(myPeerId + '-p2', 'Up arrow (local)');
        console.log('Right hold started, claimed slot:', localPlayer2SlotIndex);
      }
    }
    function updateHoldRight(dt) {
      if ((lobbyState !== 'lobby' && lobbyState !== 'countdown') || !holdingRight) return;
      var elapsed = (performance.now() - rightHoldStart) / 1000;
      rightProgress = Math.min(100, (elapsed / HOLD_DURATION) * 100);
      if (localPlayer2SlotIndex >= 0) {
        slots[localPlayer2SlotIndex].progress = rightProgress;
      }
      if (rightProgress % 25 < dt * 100) console.log('holdRight progress:', rightProgress.toFixed(1) + '%');
      if (elapsed >= HOLD_DURATION) {
        console.log('Hold duration reached! Claiming slot...');
        holdingRight = false;
        if (!hasLocalPlayer2) {
          var candidateId = myPeerId + '-p2';
          var claimed = claimSlot(candidateId, 'Up arrow (local)');
          if (claimed >= 0) {
            localPlayer2PeerId = candidateId;
            localPlayer2SlotIndex = claimed;
            hasLocalPlayer2 = true;
            console.log('Claimed slot:', claimed);
          }
        }
        if (hasLocalPlayer2 && localPlayer2SlotIndex >= 0) {
          slots[localPlayer2SlotIndex].ready = true;
          slots[localPlayer2SlotIndex].progress = 100;
          broadcast({ type: 'lobby-ready', peerId: localPlayer2PeerId });
          checkCountdownStart();
        }
      }
    }
    function releaseHoldRight() {
      holdingRight = false;
      rightProgress = 0;
      if (localPlayer2SlotIndex >= 0 && !slots[localPlayer2SlotIndex].ready) {
        // Reset slot progress if hold was interrupted before reaching 3 seconds
        slots[localPlayer2SlotIndex].progress = 0;
      }
      checkCountdownStart();
    }

    function checkCountdownStart() {
      if (lobbyState !== 'lobby') return;
      var anyReady = false;
      var anyHoldingIncomplete = false;
      for (var i = 0; i < 12; i++) {
        if (slots[i].ready) { anyReady = true; }
        if (slots[i].progress > 0 && !slots[i].ready) { anyHoldingIncomplete = true; }
      }
      console.log('checkCountdownStart: anyReady=', anyReady, 'anyHoldingIncomplete=', anyHoldingIncomplete, 'current ready slots=', slots.filter(function(s){return s.ready;}).length);
      if (anyReady && !anyHoldingIncomplete) {
        lobbyState = 'countdown';
        countdownStart = performance.now();
        countdownTimer = COUNTDOWN_DURATION;
        console.log('countdown started for level', selectedLevel);
      }
    }

    function updateCountdown(dt) {
      if (lobbyState !== 'countdown') return;
      countdownTimer -= dt;
      if (countdownTimer <= 0) {
        console.log('countdown finished, starting game');
        startGame({ level: selectedLevel });
      }
    }

    function determineHost() {
      var lowestPeer = null;
      for (var i = 0; i < 12; i++) {
        if (slots[i].peerId !== null) {
          if (!lowestPeer || slots[i].peerId < lowestPeer) {
            lowestPeer = slots[i].peerId;
          }
        }
      }
      isHost = (lowestPeer === myPeerId);
      hostPeerId = lowestPeer;
    }

    // ============================================================
    // GAME LOGIC
    // ============================================================
    function startGame(msg) {
      console.log('startGame: level=', msg.level, 'isHost=', isHost, 'slotsReady=', slots.filter(function(s){return s.ready;}).length);
      lobbyState = 'game';
      cfg = makeLevel(msg.level);
      gameTime = 0;
      lastTime = 0;

      var initialMarbles = [];
      if (msg.marbles && msg.marbles.length) {
        initialMarbles = msg.marbles.slice();
      } else {
        for (var i = 0; i < 12; i++) {
          if (slots[i].peerId !== null && slots[i].ready) {
            initialMarbles.push({
              peerId: slots[i].peerId,
              color: SLOT_COLORS[i].hex,
              slotIndex: i,
              isAI: false
            });
          }
        }
      }

      if (isHost) {
        var humanCount = initialMarbles.filter(function(m) { return !m.isAI; }).length;
        var aiCount = Math.max(0, AI_MARBLES - humanCount);
        for (var j = 0; j < aiCount; j++) {
          initialMarbles.push({
            peerId: 'AI-' + j + '-' + Date.now(),
            color: '#999',
            slotIndex: 11 - j,
            isAI: true
          });
        }
      }

      setupGameMarbles(initialMarbles);

      if (isHost) {
        broadcast({
          type: 'game-start',
          level: msg.level,
          hostPeerId: myPeerId,
          marbles: initialMarbles
        });
      }
      playTone(440, 0.1, 0.2);
    }

    function checkGameOver() {
      if (lobbyState !== 'game') return;
      var aliveMarbles = gameMarbles.filter(function(m) { return m.alive; });
      console.log('checkGameOver: alive=', aliveMarbles.length, 'total=', gameMarbles.length, 'lobbyState=', lobbyState);
      if (aliveMarbles.length <= 1) {
        lobbyState = 'gameover';
        gameOverTime = performance.now() / 1000;
        if (aliveMarbles.length === 1) {
          playTone(880, 0.2, 0.3);
          setTimeout(function() { playTone(1047, 0.2, 0.3); }, 150);
        } else {
          playTone(200, 0.2, 0.2);
        }
        var winnerPeerId = aliveMarbles.length === 1 ? aliveMarbles[0].peerId : null;
        broadcast({ type: 'gameover', winnerPeerId: winnerPeerId });
      }
    }

    // ============================================================
    // RENDERING
    // ============================================================
    function renderLobby() {
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, GW, GH);
      
      // Title
      ctx.fillStyle = '#0ff';
      ctx.font = 'bold ' + Math.max(32, Math.min(60, GW / 32)) + 'px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('MARBLE SADNESS', GW / 2, Math.max(60, GH * 0.07));
      
      // Level chooser
      ctx.font = 'bold ' + Math.max(18, Math.min(32, GW / 60)) + 'px monospace';
      ctx.fillStyle = selectedLevel > 1 ? '#fff' : '#444';
      ctx.fillText('<', GW * 0.35, 150);
      ctx.fillStyle = '#0ff';
      ctx.fillText('Level ' + selectedLevel, GW / 2, 150);
      ctx.fillStyle = selectedLevel < 100 ? '#fff' : '#444';
      ctx.fillText('>', GW * 0.65, 150);
      
      // Slot grid (3x4)
      var cols = 4;
      var rows = 3;
      var slotW = Math.min(280, Math.max(160, (GW - 120) / cols));
      var slotH = Math.min(180, Math.max(120, (GH - 260) / rows));
      var startX = (GW - slotW * cols) / 2;
      var startY = Math.max(220, GH * 0.25);
      for (var i = 0; i < cols * rows; i++) {
        var col = i % 4;
        var row = Math.floor(i / 4);
        var sx = startX + col * slotW;
        var sy = startY + row * slotH;
        var slot = slots[i];
        
        // Background
        ctx.fillStyle = slot.peerId ? SLOT_COLORS[i].hex : '#222';
        ctx.globalAlpha = 0.3;
        ctx.fillRect(sx, sy, slotW - 10, slotH - 10);
        ctx.globalAlpha = 1;
        
        // Border
        ctx.strokeStyle = slot.ready ? '#0f0' : '#888';
        ctx.lineWidth = 2;
        ctx.strokeRect(sx, sy, slotW - 10, slotH - 10);
        
        // Ready progress circle
        if (slot.progress > 0) {
          var circleRadius = Math.min(slotW, slotH) * 0.3;
          var circleX = sx + (slotW - 10) / 2;
          var circleY = sy + (slotH - 10) / 2;
          
          // Background circle
          ctx.strokeStyle = '#888';
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.arc(circleX, circleY, circleRadius, 0, Math.PI * 2);
          ctx.stroke();
          
          // Progress arc
          ctx.strokeStyle = '#0f0';
          ctx.lineWidth = 4;
          ctx.beginPath();
          ctx.arc(circleX, circleY, circleRadius, -Math.PI / 2, -Math.PI / 2 + (slot.progress / 100) * Math.PI * 2);
          ctx.stroke();
          
          // Center text
          ctx.fillStyle = '#fff';
          ctx.font = 'bold ' + Math.max(16, Math.min(24, circleRadius * 0.5)) + 'px monospace';
          ctx.textAlign = 'center';
          ctx.fillText(Math.ceil(slot.progress) + '%', circleX, circleY + 6);
        }
        
        // Info
        ctx.fillStyle = '#fff';
        ctx.font = '14px monospace';
        ctx.textAlign = 'left';
        if (slot.peerId) {
          ctx.fillText(SLOT_COLORS[i].name, sx + 10, sy + 30);
          ctx.fillStyle = '#aaa';
          ctx.font = '12px monospace';
          ctx.fillText(slot.deviceInfo.substring(0, 20), sx + 10, sy + 50);
        } else {
          ctx.fillStyle = '#666';
          ctx.fillText('[empty]', sx + 10, sy + 30);
        }
      }
      
      // Instructions
      ctx.fillStyle = '#888';
      ctx.font = Math.max(12, Math.min(18, GW / 70)) + 'px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('Hold W for left player, UP arrow for right player', GW / 2, GH - 60);
      ctx.fillText('Then use WASD / arrow keys in game', GW / 2, GH - 36);
      
      // Countdown display
      if (lobbyState === 'countdown') {
        ctx.fillStyle = '#0ff';
        ctx.font = 'bold 120px monospace';
        ctx.fillText(Math.ceil(countdownTimer), GW / 2, GH / 2);
      }
    }

    function renderGame() {
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, GW, GH);
      
      // Draw table
      ctx.fillStyle = '#4a4a2a';
      ctx.beginPath();
      ctx.arc(TABLE_CENTER_X, TABLE_CENTER_Y, TABLE_RADIUS, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(TABLE_CENTER_X, TABLE_CENTER_Y, TABLE_RADIUS, 0, Math.PI * 2);
      ctx.stroke();
      
      // Draw marbles
      for (var i = 0; i < gameMarbles.length; i++) {
        gameMarbles[i].render();
      }
      
      // HUD
      ctx.fillStyle = '#0ff';
      ctx.font = 'bold 24px monospace';
      ctx.textAlign = 'left';
      ctx.fillText('Time: ' + gameTime.toFixed(1) + 's', 20, 40);
      
      var aliveCount = gameMarbles.filter(function(m) { return m.alive; }).length;
      ctx.fillText('Marbles left: ' + aliveCount, 20, 70);
    }

    function renderGameOver() {
      ctx.fillStyle = 'rgba(0,0,0,0.7)';
      ctx.fillRect(0, 0, GW, GH);
      
      var aliveMarbles = gameMarbles.filter(function(m) { return m.alive; });
      var winner = aliveMarbles.length === 1 ? aliveMarbles[0] : null;
      
      ctx.fillStyle = '#0ff';
      ctx.font = 'bold 80px monospace';
      ctx.textAlign = 'center';
      if (winner) {
        ctx.fillText('WINNER!', GW / 2, GH / 2 - 50);
        ctx.fillStyle = winner.color;
        var winnerName = winner.isAI ? 'ROBOT BALL' : SLOT_COLORS[winner.slotIndex].name + ' Marble';
        ctx.fillText(winnerName, GW / 2, GH / 2 + 50);
      } else {
        ctx.fillText('TIE!', GW / 2, GH / 2);
      }
      
      ctx.fillStyle = '#888';
      ctx.font = '24px monospace';
      if (performance.now() / 1000 - gameOverTime > GAME_OVER_LOCKOUT) {
        ctx.fillText('SPACE to return to lobby', GW / 2, GH / 2 + 150);
      }
    }

    // ============================================================
    // NETWORKING
    // ============================================================
    var MAX_BUFFER = 16384;
    function broadcast(msg) {
      var data = JSON.stringify(msg);
      for (var pid in dataChannels) {
        var dc = dataChannels[pid];
        if (dc && dc.readyState === 'open' && dc.bufferedAmount < MAX_BUFFER) {
          dc.send(data);
        }
      }
    }

    function sendToPeer(peerId, msg) {
      var dc = dataChannels[peerId];
      if (dc && dc.readyState === 'open' && dc.bufferedAmount < MAX_BUFFER) {
        dc.send(JSON.stringify(msg));
      }
    }

    function serializeSlots() {
      var out = [];
      for (var i = 0; i < 12; i++) {
        out.push({
          peerId: slots[i].peerId,
          deviceInfo: slots[i].deviceInfo,
          progress: slots[i].progress,
          ready: slots[i].ready,
          holding: slots[i].holding
        });
      }
      return out;
    }

    function handleSignalingMessage(msg) {
      if (msg.type === 'peers') {
        // Initial peer list
        var peers = msg.peers || [];
        for (var i = 0; i < peers.length; i++) {
          initiateConnection(peers[i]);
        }
      } else if (msg.type === 'peer-joined') {
        initiateConnection(msg.peerId);
      } else if (msg.type === 'offer') {
        handleOffer(msg.peerId, msg.offer);
      } else if (msg.type === 'answer') {
        handleAnswer(msg.peerId, msg.answer);
      } else if (msg.type === 'candidate') {
        handleCandidate(msg.peerId, msg.candidate);
      } else if (msg.type === 'peer-left') {
        handlePeerLeft(msg.peerId);
      }
    }

    function initiateConnection(peerId) {
      if (peerConnections[peerId]) return;
      var pc = new RTCPeerConnection({
        iceServers: [{ urls: ['stun:stun.l.google.com:19302', 'stun:stun1.l.google.com:19302'] }]
      });
      peerConnections[peerId] = pc;
      pendingCandidates[peerId] = [];

      pc.onicecandidate = function(e) {
        if (e.candidate) {
          sendSignal(peerId, { type: 'candidate', peerId: myPeerId, candidate: e.candidate });
        }
      };

      pc.ondatachannel = function(e) {
        setupDataChannel(e.channel, peerId);
      };

      var dc = pc.createDataChannel('game', { ordered: true });
      setupDataChannel(dc, peerId);
      pc.createOffer().then(function(offer) {
        return pc.setLocalDescription(offer);
      }).then(function() {
        sendSignal(peerId, pc.localDescription);
      });
    }

    function handleOffer(peerId, offer) {
      if (peerConnections[peerId]) return;
      var pc = new RTCPeerConnection({
        iceServers: [{ urls: ['stun:stun.l.google.com:19302', 'stun:stun1.l.google.com:19302'] }]
      });
      peerConnections[peerId] = pc;
      pendingCandidates[peerId] = [];

      pc.onicecandidate = function(e) {
        if (e.candidate) {
          sendSignal(peerId, { type: 'candidate', peerId: myPeerId, candidate: e.candidate });
        }
      };

      pc.ondatachannel = function(e) {
        setupDataChannel(e.channel, peerId);
      };

      pc.setRemoteDescription(new RTCSessionDescription(offer)).then(function() {
        return pc.createAnswer();
      }).then(function(answer) {
        return pc.setLocalDescription(answer);
      }).then(function() {
        sendSignal(peerId, pc.localDescription);
      });
    }

    function handleAnswer(peerId, answer) {
      var pc = peerConnections[peerId];
      if (!pc) return;
      pc.setRemoteDescription(new RTCSessionDescription(answer));
    }

    function handleCandidate(peerId, candidate) {
      var pc = peerConnections[peerId];
      if (!pc) return;
      if (pc.remoteDescription && pc.remoteDescription.type) {
        pc.addIceCandidate(new RTCIceCandidate(candidate));
      } else {
        pendingCandidates[peerId].push(candidate);
      }
    }

    function handlePeerLeft(peerId) {
      if (peerConnections[peerId]) {
        peerConnections[peerId].close();
        delete peerConnections[peerId];
      }
      delete dataChannels[peerId];
      delete connectedPeerIds[peerId];

      var si = findSlotByPeer(peerId);
      if (si >= 0) {
        slots[si].peerId = null;
        slots[si].ready = false;
        slots[si].progress = 0;
        slots[si].holding = false;
      }

      determineHost();
      var peerCount = 0;
      for (var p in connectedPeerIds) peerCount++;
      if (peerCount === 0 && (lobbyState === 'game' || lobbyState === 'observer' || lobbyState === 'gameover')) {
        lobbyState = 'lobby';
        mySlotIndex = -1;
        cfg = null;
        for (var i = 0; i < 12; i++) {
          slots[i].peerId = null;
          slots[i].ready = false;
          slots[i].progress = 0;
          slots[i].holding = false;
        }
      }
    }

    function setupDataChannel(dc, peerId) {
      function onChannelReady() {
        dataChannels[peerId] = dc;
        connectedPeerIds[peerId] = true;
        console.log('Data channel open with', peerId);
        
        sendToPeer(peerId, {
          type: 'lobby-join',
          peerId: myPeerId,
          slotIndex: mySlotIndex,
          deviceInfo: myDeviceInfo
        });

        if (mySlotIndex >= 0) {
          sendToPeer(peerId, {
            type: 'lobby-sync',
            slots: serializeSlots(),
            level: selectedLevel,
            lobbyState: lobbyState
          });
        }
      }

      if (dc.readyState === 'open') onChannelReady();
      else dc.onopen = onChannelReady;

      dc.onmessage = function(e) {
        try {
          var msg = JSON.parse(e.data);
          handleDataMessage(msg);
        } catch (err) {
          console.error('Bad data message:', err);
        }
      };

      dc.onclose = function() {
        delete dataChannels[peerId];
      };
    }

    function handleDataMessage(msg) {
      if (msg.type === 'lobby-join') {
        var si = findSlotByPeer(msg.peerId);
        if (si < 0 && msg.slotIndex !== undefined) {
          si = msg.slotIndex;
        }
        if (si < 0) {
          for (var i = 0; i < 12; i++) {
            if (slots[i].peerId === null) { si = i; break; }
          }
        }
        if (si >= 0) {
          slots[si].peerId = msg.peerId;
          slots[si].deviceInfo = msg.deviceInfo;
        }
        determineHost();
      }
      else if (msg.type === 'lobby-sync') {
        for (var i = 0; i < (msg.slots || []).length && i < 12; i++) {
          var s = msg.slots[i];
          if (s.peerId && s.peerId !== myPeerId) {
            slots[i].peerId = s.peerId;
            slots[i].deviceInfo = s.deviceInfo;
            slots[i].progress = s.progress;
            slots[i].ready = s.ready;
            slots[i].holding = s.holding;
          }
        }
        if (msg.level) selectedLevel = msg.level;
        determineHost();
      }
      else if (msg.type === 'lobby-ready') {
        console.log('received lobby-ready from', msg.peerId);
        var si = findSlotByPeer(msg.peerId);
        if (si >= 0) {
          slots[si].ready = true;
          slots[si].progress = 100;
          slots[si].holding = false;
          checkCountdownStart();
        }
      }
      else if (msg.type === 'lobby-reset') {
        console.log('received lobby-reset');
        resetLobbyState();
      }
      else if (msg.type === 'game-start') {
        hostPeerId = msg.hostPeerId || hostPeerId;
        if (lobbyState !== 'observer' && lobbyState !== 'game') startGame(msg);
      }
      else if (msg.type === 'state') {
        if (!isHost) {
          // Update marbles from host state
          if (msg.marbles) {
            for (var i = 0; i < msg.marbles.length; i++) {
              var ms = msg.marbles[i];
              for (var j = 0; j < gameMarbles.length; j++) {
                var m = gameMarbles[j];
                if (m.peerId === ms.peerId) {
                  m.x = ms.x;
                  m.y = ms.y;
                  m.vx = ms.vx;
                  m.vy = ms.vy;
                  m.alive = ms.alive;
                  break;
                }
              }
            }
          }
        }
      }
      else if (msg.type === 'gameover') {
        if (lobbyState === 'game') {
          lobbyState = 'gameover';
          gameOverTime = performance.now() / 1000;
        }
      }
    }

    function sendSignal(peerId, msg) {
      if (sigSocket && sigSocket.readyState === WebSocket.OPEN) {
        var envelope = Object.assign({}, msg, { peerId: peerId });
        sigSocket.send(JSON.stringify(envelope));
      }
    }

    function connectSignaling() {
      var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      var wsUrl = proto + '//' + location.host + '/gm1/api/signal/ws?peerId=' + myPeerId;
      console.log('Connecting to signaling:', wsUrl);
      hud.textContent = 'Connecting to signaling...';

      sigSocket = new WebSocket(wsUrl);

      sigSocket.onopen = function() {
        console.log('Signaling WebSocket connected');
        hud.textContent = 'Connected as ' + myPeerId.slice(0, 4);
      };

      sigSocket.onmessage = function(e) {
        try {
          var msg = JSON.parse(e.data);
          handleSignalingMessage(msg);
        } catch (err) {
          console.error('Bad signaling message:', err);
        }
      };

      sigSocket.onclose = function() {
        console.log('Signaling WebSocket closed, reconnecting in 5s...');
        sigSocket = null;
        sigReconnectTimer = setTimeout(connectSignaling, 5000);
      };

      sigSocket.onerror = function(e) {
        console.error('Signaling error:', e);
      };
    }

    // ============================================================
    // INPUT
    // ============================================================
    window.addEventListener('keydown', function(e) {
      initAudio();
      var isWasd = /[wasdWASD]/.test(e.key);
      var isArrow = /Arrow|Space/.test(e.key);
      console.log('keydown:', e.key, 'lobbyState:', lobbyState, 'repeat:', e.repeat);

      if (lobbyState === 'lobby') {
        if (e.key === 'w' || e.key === 'W') {
          if (!e.repeat) { console.log('startHoldLeft'); startHoldLeft(); }
          e.preventDefault();
          return;
        }
        if (e.key === 'ArrowUp') {
          if (!e.repeat) { console.log('startHoldRight called'); startHoldRight(); }
          e.preventDefault();
          return;
        }
        if (e.key === 'ArrowLeft' && selectedLevel > 1) { selectedLevel--; e.preventDefault(); }
        if (e.key === 'ArrowRight' && selectedLevel < 100) { selectedLevel++; e.preventDefault(); }
      }
      
      if (lobbyState === 'countdown') {
        if (e.key === 'ArrowLeft' && selectedLevel > 1) { selectedLevel--; e.preventDefault(); }
        if (e.key === 'ArrowRight' && selectedLevel < 100) { selectedLevel++; e.preventDefault(); }
      }
      
      if (lobbyState === 'game') {
        if (e.key === 'ArrowLeft') keys.l = true;
        if (e.key === 'ArrowRight') keys.r = true;
        if (e.key === 'ArrowUp') keys.u = true;
        if (e.key === 'ArrowDown') keys.d = true;
        if (e.key === 'a' || e.key === 'A') keys2.l = true;
        if (e.key === 'd' || e.key === 'D') keys2.r = true;
        if (e.key === 'w' || e.key === 'W') keys2.u = true;
        if (e.key === 's' || e.key === 'S') keys2.d = true;
      }

      if (e.key === 'Escape' || e.key === '`') {
        if (lobbyState === 'game' || lobbyState === 'gameover') {
          lobbyState = 'lobby';
          cfg = null;
          resetLobbyState();
          broadcast({ type: 'lobby-reset' });
        }
      }
    });

    window.addEventListener('keyup', function(e) {
      if (e.key === 'w' || e.key === 'W') {
        if (lobbyState === 'lobby' || lobbyState === 'countdown') {
          releaseHoldLeft();
        }
      }
      if (e.key === 'ArrowUp') {
        if (lobbyState === 'lobby' || lobbyState === 'countdown') {
          releaseHoldRight();
        }
      }
      if (e.key === ' ' || e.key === 'Enter') {
        if (lobbyState === 'gameover') {
          if (performance.now() / 1000 - gameOverTime > GAME_OVER_LOCKOUT) {
            lobbyState = 'lobby';
            cfg = null;
            resetLobbyState();
            broadcast({ type: 'lobby-reset' });
          }
        }
      }
      if (e.key === 'ArrowLeft') keys.l = false;
      if (e.key === 'ArrowRight') keys.r = false;
      if (e.key === 'ArrowUp') keys.u = false;
      if (e.key === 'ArrowDown') keys.d = false;
      if (e.key === 'a' || e.key === 'A') keys2.l = false;
      if (e.key === 'd' || e.key === 'D') keys2.r = false;
      if (e.key === 'w' || e.key === 'W') keys2.u = false;
      if (e.key === 's' || e.key === 'S') keys2.d = false;
    });

    // ============================================================
    // MAIN LOOP
    // ============================================================
    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      GW = canvas.width;
      GH = canvas.height;
      TABLE_WIDTH = Math.max(TABLE_MIN_WIDTH, Math.min(TABLE_MAX_WIDTH, GW - 120));
      TABLE_HEIGHT = Math.max(TABLE_MIN_HEIGHT, Math.min(TABLE_MAX_HEIGHT, GH - 180));
      TABLE_LEFT = (GW - TABLE_WIDTH) / 2;
      TABLE_TOP = (GH - TABLE_HEIGHT) / 2;
      TABLE_CENTER_X = GW * 0.5;
      TABLE_CENTER_Y = GH * 0.5;
      TABLE_RADIUS = Math.min(TABLE_WIDTH, TABLE_HEIGHT) * 0.45;
    }

    function gameLoop(now) {
      if (!lastTime) { lastTime = now; console.log('gameLoop started'); }
      var dt = (now - lastTime) / 1000;
      lastTime = now;
      if (dt > 0.05) dt = 0.05;
      if (dt < 0.001) dt = 0.001;

      if (lobbyState === 'lobby') {
        updateHoldLeft(dt);
        updateHoldRight(dt);
        renderLobby();
      } else if (lobbyState === 'countdown') {
        updateCountdown(dt);
        renderLobby();
      } else if (lobbyState === 'game') {
        gameTime += dt;

        for (var i = 0; i < gameMarbles.length; i++) {
          var marble = gameMarbles[i];
          if (marble.isAI) {
            updateAI(marble, dt);
          } else {
            applyPlayerControl(marble, dt);
          }
        }

        // Physics update
        for (var i = 0; i < gameMarbles.length; i++) {
          gameMarbles[i].update(dt, cfg);
        }

        resolveMarbleCollisions();

        // Host broadcasts state occasionally
        if (isHost && Math.random() < 0.05) {
          var marbleStates = gameMarbles.map(function(m) {
            return { peerId: m.peerId, x: m.x, y: m.y, vx: m.vx, vy: m.vy, alive: m.alive };
          });
          broadcast({ type: 'state', marbles: marbleStates, gameTime: gameTime });
        }

        checkGameOver();
        renderGame();
      } else if (lobbyState === 'gameover') {
        renderGame();
        renderGameOver();
      }

      hud.textContent = BUILD + ' | ' + myPeerId.slice(0, 4) + ' | ' + (isHost ? 'HOST' : 'client') + ' | ' + lobbyState;
      requestAnimationFrame(gameLoop);
    }

    // ============================================================
    // INIT
    // ============================================================
    function init() {
      resizeCanvas();
      window.addEventListener('resize', resizeCanvas);
      console.log('Marble Sadness initialized');
      connectSignaling();
      requestAnimationFrame(gameLoop);
    }

    init();
  </script>
